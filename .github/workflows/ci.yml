name: Qualité du projet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Tests, lint, TypeScript et build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Installer les dépendances
        run: npm ci
      - name: Exécuter les tests
        run: npm test
      - name: Vérifier ESLint
        run: npm run lint
      - name: Vérifier TypeScript
        run: npm run typecheck
      - name: Compiler Next.js
        run: npm run build
